<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | MD Riyad Hossen Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            color: #667eea;
            font-size: 1.8rem;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        /* Login Form */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 2rem;
        }

        .login-box input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Admin Dashboard */
        .dashboard {
            display: none;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 1rem 2rem;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            color: #333;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Tab Content */
        .tab-content {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .tab-content.active {
            display: block;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        /* Skills Grid */
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .skill-badge {
            background: #667eea;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .skill-badge i {
            cursor: pointer;
            font-size: 0.8rem;
        }

        .add-skill {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .add-skill input {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        /* Projects Grid */
        .projects-list {
            display: grid;
            gap: 1rem;
        }

        .project-item {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .project-info h3 {
            margin-bottom: 0.5rem;
            color: #667eea;
        }

        .project-actions button {
            margin-left: 0.5rem;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .edit-btn {
            background: #3b82f6;
            color: white;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
        }

        /* Buttons */
        .save-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .save-btn:hover {
            transform: translateY(-2px);
        }

        /* Messages */
        .message {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 1.5rem;
            color: #667eea;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .tab-btn {
                padding: 0.7rem 1rem;
                font-size: 0.9rem;
            }

            .project-item {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Container -->
        <div id="loginContainer" class="login-container">
            <div class="login-box">
                <h2><i class="fas fa-lock"></i> Admin Login</h2>
                <input type="password" id="adminPassword" placeholder="Enter Admin Password" onkeypress="handleLoginKeypress(event)">
                <button class="login-btn" onclick="login()">Login</button>
                <p style="text-align: center; margin-top: 1rem; color: #666;">Default Password: admin123</p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <div class="header">
                <h1><i class="fas fa-cog"></i> Portfolio Admin Panel</h1>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('personal')"><i class="fas fa-user"></i> Personal Info</button>
                <button class="tab-btn" onclick="switchTab('skills')"><i class="fas fa-code"></i> Skills</button>
                <button class="tab-btn" onclick="switchTab('projects')"><i class="fas fa-project-diagram"></i> Projects</button>
                <button class="tab-btn" onclick="switchTab('contact')"><i class="fas fa-address-card"></i> Contact</button>
                <button class="tab-btn" onclick="switchTab('social')"><i class="fab fa-facebook"></i> Social Links</button>
            </div>

            <!-- Personal Info Tab -->
            <div id="personalTab" class="tab-content active">
                <h2><i class="fas fa-user-circle"></i> Personal Information</h2>
                <form id="personalForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" required>
                    </div>
                    <div class="form-group">
                        <label>Title / Tagline</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>University</label>
                        <input type="text" id="university" required>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" id="department" required>
                    </div>
                    <div class="form-group">
                        <label>About Me (Short Bio)</label>
                        <textarea id="about" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Profile Image URL</label>
                        <input type="text" id="profileImage" placeholder="https://example.com/photo.jpg">
                        <small style="color: #666;">Upload image to imgbb.com and paste direct link here</small>
                    </div>
                    <button type="submit" class="save-btn"><i class="fas fa-save"></i> Save Changes</button>
                </form>
            </div>

            <!-- Skills Tab -->
            <div id="skillsTab" class="tab-content">
                <h2><i class="fas fa-code"></i> Skills Management</h2>
                <div class="form-group">
                    <label>IoT & Embedded Skills</label>
                    <div id="iotSkillsList" class="skills-list"></div>
                    <div class="add-skill">
                        <input type="text" id="newIotSkill" placeholder="Add new skill">
                        <button onclick="addSkill('iot')" class="save-btn" style="padding: 0.8rem 1.5rem;">Add</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Robotics Skills</label>
                    <div id="roboticsSkillsList" class="skills-list"></div>
                    <div class="add-skill">
                        <input type="text" id="newRoboticsSkill" placeholder="Add new skill">
                        <button onclick="addSkill('robotics')" class="save-btn" style="padding: 0.8rem 1.5rem;">Add</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Programming Skills</label>
                    <div id="programmingSkillsList" class="skills-list"></div>
                    <div class="add-skill">
                        <input type="text" id="newProgrammingSkill" placeholder="Add new skill">
                        <button onclick="addSkill('programming')" class="save-btn" style="padding: 0.8rem 1.5rem;">Add</button>
                    </div>
                </div>
                <button onclick="saveSkills()" class="save-btn"><i class="fas fa-save"></i> Save All Skills</button>
            </div>

            <!-- Projects Tab -->
            <div id="projectsTab" class="tab-content">
                <h2><i class="fas fa-project-diagram"></i> Projects Management</h2>
                <button onclick="openProjectModal()" class="save-btn" style="margin-bottom: 1rem;"><i class="fas fa-plus"></i> Add New Project</button>
                <div id="projectsList" class="projects-list"></div>
            </div>

            <!-- Contact Tab -->
            <div id="contactTab" class="tab-content">
                <h2><i class="fas fa-address-card"></i> Contact Information</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="contactEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="contactPhone">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="contactLocation">
                    </div>
                    <button type="submit" class="save-btn"><i class="fas fa-save"></i> Save Changes</button>
                </form>
            </div>

            <!-- Social Links Tab -->
            <div id="socialTab" class="tab-content">
                <h2><i class="fas fa-share-alt"></i> Social Media Links</h2>
                <form id="socialForm">
                    <div class="form-group">
                        <label><i class="fab fa-github"></i> GitHub</label>
                        <input type="url" id="githubLink" placeholder="https://github.com/username">
                    </div>
                    <div class="form-group">
                        <label><i class="fab fa-linkedin"></i> LinkedIn</label>
                        <input type="url" id="linkedinLink" placeholder="https://linkedin.com/in/username">
                    </div>
                    <div class="form-group">
                        <label><i class="fab fa-twitter"></i> Twitter</label>
                        <input type="url" id="twitterLink" placeholder="https://twitter.com/username">
                    </div>
                    <div class="form-group">
                        <label><i class="fab fa-facebook"></i> Facebook</label>
                        <input type="url" id="facebookLink" placeholder="https://facebook.com/username">
                    </div>
                    <button type="submit" class="save-btn"><i class="fas fa-save"></i> Save Changes</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add New Project</h3>
            <form id="projectForm">
                <input type="hidden" id="projectIndex">
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="projectName" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="projectDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Technologies (comma separated)</label>
                    <input type="text" id="projectTech" placeholder="ESP32, MQTT, Node-RED">
                </div>
                <div class="form-group">
                    <label>GitHub Link</label>
                    <input type="url" id="projectGithub" placeholder="https://github.com/username/repo">
                </div>
                <div class="form-group">
                    <label>Live Demo Link</label>
                    <input type="url" id="projectDemo" placeholder="https://project.vercel.app">
                </div>
                <div class="form-group">
                    <label>Icon (FontAwesome class)</label>
                    <input type="text" id="projectIcon" value="fas fa-project-diagram">
                </div>
                <button type="submit" class="save-btn">Save Project</button>
                <button type="button" onclick="closeProjectModal()" class="save-btn" style="background: #6c757d; margin-top: 0.5rem;">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        // Admin password
        const ADMIN_PASSWORD = "admin123";
        
        // Data storage
        let portfolioData = {
            personal: {
                name: "MD Riyad Hossen",
                title: "IoT & Robotics Engineer",
                university: "University of Frontier Technology, Bangladesh",
                department: "IoT and Robotics Engineering (IRE)",
                about: "I'm passionate about creating intelligent systems that bridge the physical and digital worlds. With expertise in embedded systems, robotics programming, and IoT solutions, I strive to develop innovative technologies that solve real-world problems.",
                profileImage: ""
            },
            skills: {
                iot: ["Arduino", "Raspberry Pi", "ESP32/ESP8266", "Sensors", "MQTT", "LoRa"],
                robotics: ["ROS", "Robot Kinematics", "Actuators", "PID Control", "Computer Vision"],
                programming: ["Python", "C/C++", "JavaScript", "HTML/CSS", "SQL"]
            },
            projects: [
                {
                    name: "Smart Home Automation",
                    description: "IoT-based home automation system using ESP32 and sensors. Control appliances remotely via mobile app with voice commands.",
                    technologies: ["ESP32", "MQTT", "Node-RED"],
                    github: "#",
                    demo: "#",
                    icon: "fas fa-home"
                },
                {
                    name: "Autonomous Obstacle Avoiding Robot",
                    description: "Arduino-based robot that navigates autonomously using ultrasonic sensors and motor control algorithms.",
                    technologies: ["Arduino", "Ultrasonic Sensor", "Motor Driver"],
                    github: "#",
                    demo: "#",
                    icon: "fas fa-robot"
                },
                {
                    name: "Smart Agriculture System",
                    description: "IoT solution for precision farming with soil moisture monitoring, automated irrigation, and weather prediction.",
                    technologies: ["Raspberry Pi", "Sensors", "Cloud"],
                    github: "#",
                    demo: "#",
                    icon: "fas fa-tractor"
                }
            ],
            contact: {
                email: "riyad.hossen@uft.edu.bd",
                phone: "+880 1XXX-XXXXXX",
                location: "Bangladesh"
            },
            social: {
                github: "https://github.com/yourusername",
                linkedin: "https://linkedin.com/in/yourusername",
                twitter: "https://twitter.com/yourusername",
                facebook: "https://facebook.com/yourusername"
            }
        };

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem("portfolioData");
            if (saved) {
                portfolioData = JSON.parse(saved);
            }
            loadAllData();
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem("portfolioData", JSON.stringify(portfolioData));
            showMessage("All changes saved successfully!", "success");
        }

        // Show message
        function showMessage(msg, type) {
            const dashboard = document.getElementById("dashboard");
            const existingMsg = document.querySelector(".message");
            if (existingMsg) existingMsg.remove();
            
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = msg;
            dashboard.insertBefore(messageDiv, dashboard.firstChild);
            setTimeout(() => messageDiv.remove(), 3000);
        }

        // Login function
        function login() {
            const password = document.getElementById("adminPassword").value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById("loginContainer").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
                loadData();
            } else {
                alert("Wrong password! Default password: admin123");
            }
        }

        function handleLoginKeypress(event) {
            if (event.key === "Enter") {
                login();
            }
        }

        function logout() {
            document.getElementById("loginContainer").style.display = "flex";
            document.getElementById("dashboard").style.display = "none";
            document.getElementById("adminPassword").value = "";
        }

        // Switch tabs
        function switchTab(tabName) {
            document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
            
            document.getElementById(`${tabName}Tab`).classList.add("active");
            event.target.classList.add("active");
        }

        // Load all data to forms
        function loadAllData() {
            // Personal Info
            document.getElementById("fullName").value = portfolioData.personal.name;
            document.getElementById("title").value = portfolioData.personal.title;
            document.getElementById("university").value = portfolioData.personal.university;
            document.getElementById("department").value = portfolioData.personal.department;
            document.getElementById("about").value = portfolioData.personal.about;
            document.getElementById("profileImage").value = portfolioData.personal.profileImage || "";
            
            // Skills
            renderSkills();
            
            // Projects
            renderProjects();
            
            // Contact
            document.getElementById("contactEmail").value = portfolioData.contact.email;
            document.getElementById("contactPhone").value = portfolioData.contact.phone;
            document.getElementById("contactLocation").value = portfolioData.contact.location;
            
            // Social
            document.getElementById("githubLink").value = portfolioData.social.github;
            document.getElementById("linkedinLink").value = portfolioData.social.linkedin;
            document.getElementById("twitterLink").value = portfolioData.social.twitter;
            document.getElementById("facebookLink").value = portfolioData.social.facebook;
        }

        // Render skills
        function renderSkills() {
            // IoT Skills
            const iotDiv = document.getElementById("iotSkillsList");
            iotDiv.innerHTML = portfolioData.skills.iot.map(skill => 
                `<span class="skill-badge">${skill} <i class="fas fa-times" onclick="removeSkill('iot', '${skill}')"></i></span>`
            ).join("");
            
            // Robotics Skills
            const roboticsDiv = document.getElementById("roboticsSkillsList");
            roboticsDiv.innerHTML = portfolioData.skills.robotics.map(skill => 
                `<span class="skill-badge">${skill} <i class="fas fa-times" onclick="removeSkill('robotics', '${skill}')"></i></span>`
            ).join("");
            
            // Programming Skills
            const programmingDiv = document.getElementById("programmingSkillsList");
            programmingDiv.innerHTML = portfolioData.skills.programming.map(skill => 
                `<span class="skill-badge">${skill} <i class="fas fa-times" onclick="removeSkill('programming', '${skill}')"></i></span>`
            ).join("");
        }

        // Add skill
        function addSkill(category) {
            let inputId, skill;
            if (category === "iot") {
                inputId = "newIotSkill";
                skill = document.getElementById(inputId).value.trim();
                if (skill) portfolioData.skills.iot.push(skill);
            } else if (category === "robotics") {
                inputId = "newRoboticsSkill";
                skill = document.getElementById(inputId).value.trim();
                if (skill) portfolioData.skills.robotics.push(skill);
            } else if (category === "programming") {
                inputId = "newProgrammingSkill";
                skill = document.getElementById(inputId).value.trim();
                if (skill) portfolioData.skills.programming.push(skill);
            }
            
            if (skill) {
                document.getElementById(inputId).value = "";
                renderSkills();
                saveData();
                showMessage(`${skill} added successfully!`, "success");
            }
        }

        // Remove skill
        function removeSkill(category, skill) {
            if (category === "iot") {
                portfolioData.skills.iot = portfolioData.skills.iot.filter(s => s !== skill);
            } else if (category === "robotics") {
                portfolioData.skills.robotics = portfolioData.skills.robotics.filter(s => s !== skill);
            } else if (category === "programming") {
                portfolioData.skills.programming = portfolioData.skills.programming.filter(s => s !== skill);
            }
            renderSkills();
            saveData();
            showMessage("Skill removed!", "success");
        }

        // Save skills
        function saveSkills() {
            saveData();
        }

        // Render projects
        function renderProjects() {
            const container = document.getElementById("projectsList");
            if (portfolioData.projects.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">No projects yet. Click "Add New Project" to create one.</p>';
                return;
            }
            container.innerHTML = portfolioData.projects.map((project, index) => `
                <div class="project-item">
                    <div class="project-info">
                        <h3><i class="${project.icon}"></i> ${project.name}</h3>
                        <p>${project.description.substring(0, 100)}${project.description.length > 100 ? '...' : ''}</p>
                        <small>Tech: ${project.technologies.join(", ")}</small>
                    </div>
                    <div class="project-actions">
                        <button class="edit-btn" onclick="editProject(${index})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-btn" onclick="deleteProject(${index})"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join("");
        }

        // Open project modal
        function openProjectModal() {
            document.getElementById("modalTitle").textContent = "Add New Project";
            document.getElementById("projectForm").reset();
            document.getElementById("projectIndex").value = "";
            document.getElementById("projectIcon").value = "fas fa-project-diagram";
            document.getElementById("projectModal").style.display = "flex";
        }

        function closeProjectModal() {
            document.getElementById("projectModal").style.display = "none";
        }

        function editProject(index) {
            const project = portfolioData.projects[index];
            document.getElementById("modalTitle").textContent = "Edit Project";
            document.getElementById("projectIndex").value = index;
            document.getElementById("projectName").value = project.name;
            document.getElementById("projectDesc").value = project.description;
            document.getElementById("projectTech").value = project.technologies.join(", ");
            document.getElementById("projectGithub").value = project.github;
            document.getElementById("projectDemo").value = project.demo;
            document.getElementById("projectIcon").value = project.icon;
            document.getElementById("projectModal").style.display = "flex";
        }

        function deleteProject(index) {
            if (confirm("Are you sure you want to delete this project?")) {
                portfolioData.projects.splice(index, 1);
                renderProjects();
                saveData();
                showMessage("Project deleted!", "success");
            }
        }

        // Save project from modal
        document.getElementById("projectForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const technologies = document.getElementById("projectTech").value.split(",").map(t => t.trim()).filter(t => t);
            
            const project = {
                name: document.getElementById("projectName").value,
                description: document.getElementById("projectDesc").value,
                technologies: technologies,
                github: document.getElementById("projectGithub").value,
                demo: document.getElementById("projectDemo").value,
                icon: document.getElementById("projectIcon").value
            };
            
            const index = document.getElementById("projectIndex").value;
            if (index === "") {
                portfolioData.projects.push(project);
                showMessage("Project added successfully!", "success");
            } else {
                portfolioData.projects[parseInt(index)] = project;
                showMessage("Project updated successfully!", "success");
            }
            
            renderProjects();
            saveData();
            closeProjectModal();
        });

        // Save personal info
        document.getElementById("personalForm").addEventListener("submit", function(e) {
            e.preventDefault();
            portfolioData.personal.name = document.getElementById("fullName").value;
            portfolioData.personal.title = document.getElementById("title").value;
            portfolioData.personal.university = document.getElementById("university").value;
            portfolioData.personal.department = document.getElementById("department").value;
            portfolioData.personal.about = document.getElementById("about").value;
            portfolioData.personal.profileImage = document.getElementById("profileImage").value;
            saveData();
        });

        // Save contact info
        document.getElementById("contactForm").addEventListener("submit", function(e) {
            e.preventDefault();
            portfolioData.contact.email = document.getElementById("contactEmail").value;
            portfolioData.contact.phone = document.getElementById("contactPhone").value;
            portfolioData.contact.location = document.getElementById("contactLocation").value;
            saveData();
        });

        // Save social links
        document.getElementById("socialForm").addEventListener("submit", function(e) {
            e.preventDefault();
            portfolioData.social.github = document.getElementById("githubLink").value;
            portfolioData.social.linkedin = document.getElementById("linkedinLink").value;
            portfolioData.social.twitter = document.getElementById("twitterLink").value;
            portfolioData.social.facebook = document.getElementById("facebookLink").value;
            saveData();
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById("projectModal");
            if (event.target === modal) {
                closeProjectModal();
            }
        }
    </script>
</body>
</html>
